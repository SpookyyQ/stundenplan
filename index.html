<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ElitePlan</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Login Screen -->
  <div class="login-screen" id="loginScreen">
    <div class="wrapper">
      <form id="loginForm">
        <div class="login-logo-row">
          <span class="login-logo-icon">◈</span>
          <p class="form-login">ElitePlan</p>
        </div>
        <p class="login-sub" id="loginSub">Melde dich mit deiner Matrikelnummer an.</p>
        <div class="input-box">
          <input type="password" id="loginPassword" placeholder="Matrikelnummer" required autocomplete="current-password" />
          <span class="input-icon">🔒</span>
        </div>
        <p class="login-error hidden" id="loginError"></p>
        <button class="btn" type="submit" id="loginBtn">Anmelden</button>
      </form>
    </div>
  </div>

  <div class="app" id="appRoot" style="display:none">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">ElitePlan</span>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-btn active" data-view="timetable">
          <span class="nav-icon">▦</span>
          <span>Wochenplan</span>
        </button>
        <button class="nav-btn" data-view="courses">
          <span class="nav-icon">✦</span>
          <span>Kurse</span>
        </button>
        <button class="nav-btn" data-view="settings">
          <span class="nav-icon">⚙</span>
          <span>Einstellungen</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <div class="current-week">
          <span class="week-label">KW</span>
          <span class="week-number" id="weekNumber"></span>
        </div>
        <button class="nav-btn logout-btn" id="logoutBtn">
          <span class="nav-icon">⏻</span>
          <span>Abmelden</span>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">

      <!-- Timetable View -->
      <section class="view active" id="view-timetable">
        <header class="main-header">
          <div class="header-left">
            <h1 id="greetingText">Wochenplan</h1>
            <p class="subtitle" id="weekRange"></p>
          </div>
          <div class="header-right">
            <button class="btn-secondary" id="prevWeek">‹</button>
            <button class="btn-secondary" id="todayBtn">Heute</button>
            <button class="btn-secondary" id="nextWeek">›</button>
            <button class="btn-primary" id="openAddLesson">+ Stunde</button>
          </div>
        </header>

        <div class="timetable-grid" id="timetableGrid"></div>
      </section>

      <!-- Courses View -->
      <section class="view" id="view-courses">
        <header class="main-header">
          <div class="header-left">
            <h1>Meine Kurse</h1>
            <p class="subtitle">Verwalte deine Fächer</p>
          </div>
          <div class="header-right">
            <button class="btn-primary" id="openAddCourse">+ Kurs hinzufügen</button>
          </div>
        </header>
        <div class="courses-grid" id="coursesGrid"></div>
      </section>

      <!-- Settings View -->
      <section class="view" id="view-settings">
        <header class="main-header">
          <div class="header-left">
            <h1>Einstellungen</h1>
            <p class="subtitle">Persönliche Angaben</p>
          </div>
        </header>
        <div class="settings-body">
          <div class="settings-card">
            <h2 class="settings-section-title">Profil</h2>
            <div class="form-group">
              <label>Vorname</label>
              <input type="text" id="settingsFirstName" placeholder="z.B. Max" />
            </div>
            <div class="form-group">
              <label>Nachname</label>
              <input type="text" id="settingsLastName" placeholder="z.B. Mustermann" />
            </div>
            <div class="form-actions">
              <div class="spacer"></div>
              <button class="btn-primary" id="saveSettings">Speichern</button>
            </div>
          </div>

          <div class="settings-card" style="margin-top:16px">
            <h2 class="settings-section-title">Semester</h2>
            <div class="semester-info">
              <span class="semester-label">Semesterende</span>
              <span class="semester-date" id="semesterEndDisplay"></span>
            </div>
          </div>
        </div>
      </section>

    </main>
  </div>

  <!-- Modal: Stunde hinzufügen -->
  <div class="modal-overlay" id="modalLesson">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalLessonTitle">Stunde hinzufügen</h2>
        <button class="modal-close" id="closeLessonModal">✕</button>
      </div>
      <form id="lessonForm">
        <input type="hidden" id="lessonId" />
        <div class="form-group">
          <label>Kurs</label>
          <select id="lessonCourse" required></select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Tag</label>
            <select id="lessonDay" required>
              <option value="0">Montag</option>
              <option value="1">Dienstag</option>
              <option value="2">Mittwoch</option>
              <option value="3">Donnerstag</option>
              <option value="4">Freitag</option>
            </select>
          </div>
          <div class="form-group">
            <label>Von</label>
            <input type="time" id="lessonStart" required />
          </div>
          <div class="form-group">
            <label>Bis</label>
            <input type="time" id="lessonEnd" required />
          </div>
        </div>
        <div class="form-group">
          <label>Raum <span class="optional">(optional)</span></label>
          <input type="text" id="lessonRoom" placeholder="z.B. A101" />
        </div>
        <div class="form-actions">
          <button type="button" class="btn-danger hidden" id="deleteLessonBtn">Löschen</button>
          <div class="spacer"></div>
          <button type="button" class="btn-secondary" id="cancelLessonBtn">Abbrechen</button>
          <button type="submit" class="btn-primary">Speichern</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Kurs hinzufügen -->
  <div class="modal-overlay" id="modalCourse">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalCourseTitle">Kurs hinzufügen</h2>
        <button class="modal-close" id="closeCourseModal">✕</button>
      </div>
      <form id="courseForm">
        <input type="hidden" id="courseId" />
        <div class="form-group">
          <label>Fachname</label>
          <input type="text" id="courseName" placeholder="z.B. Mathematik" required />
        </div>
        <div class="form-group">
          <label>Dozent <span class="optional">(optional)</span></label>
          <input type="text" id="courseTeacher" placeholder="z.B. Hr. Müller" />
        </div>
        <div class="form-group">
          <label>Raum <span class="optional">(optional)</span></label>
          <input type="text" id="courseRoom" placeholder="z.B. A101" />
        </div>
        <div class="form-group">
          <label>Farbe</label>
          <div class="color-picker" id="colorPicker"></div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-danger hidden" id="deleteCourseBtn">Löschen</button>
          <div class="spacer"></div>
          <button type="button" class="btn-secondary" id="cancelCourseBtn">Abbrechen</button>
          <button type="submit" class="btn-primary">Speichern</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
